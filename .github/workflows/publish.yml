name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.17" # uv-version
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint check
        run: uv run ruff check .

      - name: ty type check
        run: uv run ty check src/

      - name: Security scan (Bandit)
        run: uv run bandit -r src -c pyproject.toml

  test:
    needs: [lint-and-typecheck]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.17" # uv-version
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run tests
        run: uv run pytest tests/ -v --no-header -p no:cacheprovider

  build:
    needs: [test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.17" # uv-version
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: [build]
    runs-on: ubuntu-24.04
    # Only publish to TestPyPI for pre-release tags (e.g. v0.2.0b1, v0.2.0rc1)
    if: github.event.release.prerelease == true
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: [build]
    runs-on: ubuntu-24.04
    # Only publish to PyPI for stable releases
    if: github.event.release.prerelease == false
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
